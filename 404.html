<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Você foi convidado pro Bondlive 💕</title>
  <meta name="description" content="Seu amor quer se conectar com você. Instale o app e vocês estarão juntos em 1 minuto." />

  <!-- Open Graph — preview no WhatsApp, Telegram, Instagram -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Bondlive" />
  <meta property="og:title"       content="Seu amor te convidou pro Bondlive 💕" />
  <meta property="og:description" content="Instale o app e conecte em 1 minuto. Localização em tempo real para casais." />
  <meta property="og:image"       content="https://app.bondlive.com.br/og-invite.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url"         content="https://app.bondlive.com.br/i/" />
</head>
<script>
  // Redireciona /i/CODIGO → /i/?c=CODIGO para o GitHub Pages conseguir servir o index.html
  var path = window.location.pathname;
  var match = path.match(/^\/i\/([A-Za-z0-9]+)\/?$/);
  if (match) {
    window.location.replace('/i/?c=' + match[1]);
  }
</script>
</html>
