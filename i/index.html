<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Você foi convidado pro Bondlive 💕</title>
  <meta name="description" content="Seu amor te chamou pro Bondlive. Instale e conecte agora." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #fff 0%, #fef0f5 100%);
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(192, 67, 106, 0.12);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hearts {
      font-size: 52px;
      margin-bottom: 20px;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.12); }
      28% { transform: scale(1); }
      42% { transform: scale(1.08); }
      56% { transform: scale(1); }
    }

    .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #c0436a;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
      color: #1a1a2e;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 32px;
    }

    .invite-badge {
      background: #fef0f5;
      border: 1.5px solid #f5c0d0;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #c0436a;
      letter-spacing: 2px;
      margin-bottom: 28px;
      font-family: monospace;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 18px 24px;
      background: #c0436a;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(192, 67, 106, 0.35);
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(192, 67, 106, 0.25);
    }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #bbb;
    }

    .loading-msg {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
      display: none;
    }

    .loading-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="card">
    <div class="hearts">💕</div>
    <div class="brand">Bondlive</div>
    <h1>Você foi convidado pro Bondlive!</h1>
    <p>Seu amor quer se conectar com você. Instale o app e vocês estarão conectados em menos de 1 minuto.</p>
    <div class="invite-badge" id="invite-badge" style="display:none"></div>
    <a class="btn-primary" id="install-btn" href="#" onclick="handleInstall(event)">
      Instalar e conectar
    </a>
    <div class="loading-msg" id="loading-msg">Abrindo a Play Store...</div>
    <div class="note">Disponível para Android · Grátis</div>
  </div>

  <script>
    (function () {
      // Extrai o código do convite da URL: /i/ABCDEF → "ABCDEF"
      var code = window.location.pathname.replace(/^\/i\/?/, '').replace(/\/$/, '').toUpperCase();

      if (code && code.length === 6) {
        var badge = document.getElementById('invite-badge');
        badge.textContent = code;
        badge.style.display = 'block';
      }

      var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.bondlive.app'
        + (code ? '&referrer=invite_' + code : '');

      // Atualiza o href do botão com a Play Store URL para caso o JS falhe
      document.getElementById('install-btn').href = playStoreUrl;

      var isAndroid = /android/i.test(navigator.userAgent);

      function tryOpenApp() {
        if (!isAndroid) return false;

        // Tenta abrir via intent URI (Android Chrome suporta intent://)
        var intentUri = 'intent://app.bondlive.com.br/i/' + code
          + '#Intent;scheme=https;package=com.bondlive.app;S.browser_fallback_url='
          + encodeURIComponent(playStoreUrl) + ';end';

        window.location.href = intentUri;
        return true;
      }

      window.handleInstall = function (e) {
        e.preventDefault();
        var loadingMsg = document.getElementById('loading-msg');
        loadingMsg.classList.add('visible');

        var opened = tryOpenApp();

        // Após 1.5s sem sucesso (app não instalado), redireciona pra Play Store
        setTimeout(function () {
          window.location.href = playStoreUrl;
        }, 1500);
      };

      // Tenta abrir o app automaticamente ao carregar a página (apenas Android)
      if (isAndroid && code) {
        setTimeout(function () {
          tryOpenApp();
        }, 300);
      }
    })();
  </script>

</body>
</html>
